          - heading "Senate clerk of court to work over weekend for VP Sara pre-trial order" [level=3] [ref=e163]
          - paragraph [ref=e164]: The pre-trial conference for the impeachment case against Vice President Sara Duterte is expected to conclude on Thursday evening, June 25. Senate Secretary Renato Bantug Jr., who also serves as clerk of the Senate impeachment court, said the conclusion of the evidence-marking process would formally end the pre-trial conference and pave the way for the preparation of the pre-trial order. “Formally, the pre-trial conference will be concluded, and then the staff work will begin on the drafting and finalization of the pre-trial order,” Bantug told reporters. He said it remains unclear when the pre-trial order will be released, noting that court personnel have yet to begin drafting the document. “I don't know yet. Until we start drafting it, I cannot estimate yet the time that it will take us to complete the draft of the pre-trial order. But we will finish it as soon, as fast as humanly possible,” Bantug said. He added that staff members may work through the weekend if necessary to complete the document. Bantug described the pre-trial order as a roadmap that will guide the conduct of the impeachment trial, taking into account the positions of both parties. “Essentially, a pre-trial order is the roadmap on how the trial can best be conducted, taking into consideration the respective positions of the parties,” he said. The order will also contain any stipulations and agreements reached by the prosecution and defense during the pre-trial conference. The prosecution and defense have already completed the pre-marking of evidence for Articles III and IV of the impeachment complaint. Bantug said the parties have also indicated the amount of time they expect to need for the presentation of their cases once the trial begins. Based on commitments made during the pre-trial proceedings, the prosecution estimates it will require around 62 trial dates to present its evidence, while the defense expects to need 35 trial dates.
